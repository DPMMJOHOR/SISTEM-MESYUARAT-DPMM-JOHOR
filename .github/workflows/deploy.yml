name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config-local.js if missing
        run: |
          if [ ! -f "config-local.js" ]; then
            echo "var CONFIG = { SUPABASE_KEY: 'YOUR_SUPABASE_KEY_HERE', GOOGLE_CID: 'YOUR_GOOGLE_CID_HERE', TURNSTILE_SITE_KEY: 'YOUR_TURNSTILE_SITE_KEY_HERE' };" > config-local.js
            echo "config-local.js created"
          fi

      - name: Inject secrets into config-local.js
        run: |
          if [ -f "config-local.js" ]; then
            echo "Current config-local.js content:"
            cat config-local.js
            echo "Injecting secrets..."
            sed -i "s/YOUR_SUPABASE_KEY_HERE/${{ secrets.SUPABASE_KEY }}/" config-local.js
            sed -i "s/YOUR_GOOGLE_CID_HERE/${{ secrets.GOOGLE_CID }}/" config-local.js
            sed -i "s/YOUR_TURNSTILE_SITE_KEY_HERE/${{ secrets.TURNSTILE_SITE_KEY }}/" config-local.js
            echo "After injection:"
            cat config-local.js
            echo "Secrets injected successfully"
          else
            echo "config-local.js not found, skipping secret injection"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
