name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config-local.js
        run: |
          if [ -f "config-local.js" ]; then
            sed -i "s/CONFIG.SUPABASE_KEY = 'YOUR_SUPABASE_KEY_HERE'/CONFIG.SUPABASE_KEY = '${{ secrets.SUPABASE_KEY }}'/" config-local.js
            sed -i "s/CONFIG.GROQ_KEY = 'YOUR_GROQ_KEY_HERE'/CONFIG.GROQ_KEY = '${{ secrets.GROQ_KEY }}'/" config-local.js
            sed -i "s/CONFIG.GOOGLE_CID = 'YOUR_GOOGLE_CID_HERE'/CONFIG.GOOGLE_CID = '${{ secrets.GOOGLE_CID }}'/" config-local.js
            sed -i "s/CONFIG.TURNSTILE_SITE_KEY = 'YOUR_TURNSTILE_SITE_KEY_HERE'/CONFIG.TURNSTILE_SITE_KEY = '${{ secrets.TURNSTILE_SITE_KEY }}'/" config-local.js
            echo "Secrets injected successfully"
          else
            echo "config-local.js not found, skipping secret injection"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
