name: Meeting Reminder

on:
  schedule:
    # Runs daily at 8:00 AM MYT (UTC+8 = 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days_ahead:
        description: 'Days ahead to check for meetings (default: 3)'
        required: false
        default: '3'

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run meeting reminder
        run: node meeting-reminder.js
        working-directory: scripts
        env:
          SUPABASE_URL: https://lzoloupwtqmjyupvofhh.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:   ${{ secrets.GMAIL_PASS }}
          ADMIN_EMAIL:  ${{ secrets.ADMIN_EMAIL }}
          DAYS_AHEAD:   ${{ github.event.inputs.days_ahead || '3' }}
